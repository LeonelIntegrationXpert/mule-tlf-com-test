# ============================================================================================
# ✅ mule-tlf-com-test | RAML CI | Release Flow Guardian
# ============================================================================================
# Responsabilidade:
#   - Validar release-manifest.yml
#   - Validar sintaxe RAML
#   - Executar API Contract Guard
#   - Gerar pacote ZIP do Exchange
#   - Gerar report HTML/JSON como artifact
# ============================================================================================

trigger:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next
      - feature/*

pr:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next

pool:
  vmImage: ubuntu-latest

variables:
  APP_NAME: mule-tlf-com-test
  API_MAIN_FILE: api.raml
  API_VERSION: v1
  EXCHANGE_ASSET_ID: mule-tlf-com-test
  EXCHANGE_ASSET_NAME: Mule TLF COM Test
  EXCHANGE_ASSET_DESCRIPTION: API RAML de laboratório para Release Flow Guardian.
  EXCHANGE_ZIP: dist/mule-tlf-com-test-exchange.zip
  EXCHANGE_MINOR_VERSION: "1.0"
  EXCHANGE_INITIAL_VERSION: "1.0.0"

steps:
  - checkout: self
    clean: true
    fetchDepth: 0

  - task: NodeTool@0
    displayName: "Setup Node.js 20"
    inputs:
      versionSpec: "20.x"

  - task: Bash@3
    displayName: "Install dependencies"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        npm install

  - task: Bash@3
    displayName: "Validate release manifest"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        npm run validate:release

  - task: Bash@3
    displayName: "Validate RAML syntax"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        npm run validate:raml

  - task: Bash@3
    displayName: "API Contract Guard"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        npm run contract:guard

  - task: Bash@3
    displayName: "Build Exchange package"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        npm run package:exchange

  - task: Bash@3
    displayName: "Generate HTML report"
    condition: always()
    inputs:
      targetType: inline
      script: |
        npm run report:html || true

  - publish: dist
    artifact: mule-tlf-com-test-validation-artifacts
    condition: always()
    displayName: "Publish validation artifacts"
