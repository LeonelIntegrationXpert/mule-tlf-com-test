trigger:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next

pr:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next

pool:
  vmImage: ubuntu-latest

variables:
  APP_NAME: mule-tlf-com-test
  API_MAIN_FILE: api.raml
  EXCHANGE_ASSET_ID: mule-tlf-com-test
  EXCHANGE_MINOR_VERSION: '1.0'

steps:
  - checkout: self
    fetchDepth: 0

  - task: UseNode@1
    inputs:
      version: '20.x'
    displayName: Setup Node.js

  - script: |
      npm install --no-audit --no-fund
      npm run deps:check
    displayName: Install dependencies

  - script: npm run validate:config
    displayName: Validate Guardian config

  - script: npm run validate:release
    displayName: Validate release manifest

  - script: npm run validate:raml
    displayName: Validate RAML

  - script: npm run stability:resolve
    displayName: Resolve stability

  - script: npm run contract:extract
    displayName: Extract API contract

  - script: npm run contract:guard
    displayName: API Contract Guard

  - script: npm run package:exchange
    displayName: Build Exchange package

  - script: npm run report:html
    condition: always()
    displayName: Generate HTML report

  - publish: dist
    artifact: release-flow-guardian-report
    condition: always()
    displayName: Publish artifacts
