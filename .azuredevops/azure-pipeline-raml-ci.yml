trigger:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next

pr:
  branches:
    include:
      - main
      - master
      - release/current
      - release/next

pool:
  vmImage: ubuntu-latest

variables:
  GUARDIAN_CONFIG: release/guardian.config.yml

steps:
  - checkout: self
    fetchDepth: 0

  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: Setup Node.js

  - script: |
      npm install --no-save --package-lock=false --no-audit --no-fund github:LeonelIntegrationXpert/release-flow-guardian-core#main
      npx release-flow-guardian preflight
    displayName: Run Release Flow Guardian preflight

  - publish: dist
    artifact: release-flow-guardian
    condition: always()
