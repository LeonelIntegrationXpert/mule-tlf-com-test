# ============================================================================================
# 🚀 mule-tlf-com-test | Exchange Publish | Release Flow Guardian
# ============================================================================================
# Responsabilidade:
#   - Validar manifest/contrato
#   - Gerar pacote ZIP do RAML
#   - Publicar no Anypoint Exchange usando Connected App
#   - Resolver versão automaticamente:
#       asset não existe -> 1.0.0
#       asset existe     -> latest 1.0.x + 1
#   - Tratar 409 com auto bump até 3 vezes
#   - Bloquear 400 com diagnóstico claro
#
# Variáveis secretas esperadas na pipeline ou variable group:
#   ANYPOINT_CONNECTED_APP_CLIENT_ID
#   ANYPOINT_CONNECTED_APP_CLIENT_SECRET
#   ANYPOINT_ORG
#   ANYPOINT_HOST
#   EXCHANGE_GROUP_ID
# ============================================================================================

trigger:
  branches:
    include:
      - main
      - master

pr: none

parameters:
  - name: publishExchange
    displayName: Publicar no Exchange?
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  APP_NAME: mule-tlf-com-test
  API_MAIN_FILE: api.raml
  API_VERSION: v1
  EXCHANGE_ASSET_ID: mule-tlf-com-test
  EXCHANGE_ASSET_NAME: Mule TLF COM Test
  EXCHANGE_ASSET_DESCRIPTION: API RAML de laboratório para Release Flow Guardian.
  EXCHANGE_ZIP: dist/mule-tlf-com-test-exchange.zip
  EXCHANGE_MINOR_VERSION: "1.0"
  EXCHANGE_INITIAL_VERSION: "1.0.0"
  EXCHANGE_MAX_CONFLICT_BUMPS: "3"
  EXCHANGE_MAX_TRANSIENT_RETRIES: "3"

stages:
  - stage: validate
    displayName: "Validate RAML and Manifest"
    jobs:
      - job: validate
        displayName: "Validate contract"
        steps:
          - checkout: self
            clean: true
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Setup Node.js 20"
            inputs:
              versionSpec: "20.x"

          - task: Bash@3
            displayName: "Install dependencies"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm install

          - task: Bash@3
            displayName: "Validate manifest and RAML"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm run validate

          - task: Bash@3
            displayName: "Build Exchange package"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm run package:exchange

          - publish: dist
            artifact: mule-tlf-com-test-validation-artifacts
            displayName: "Publish validation artifacts"

  - stage: publish_exchange
    displayName: "Publish to Anypoint Exchange"
    dependsOn: validate
    condition: and(succeeded(), eq('${{ parameters.publishExchange }}', 'true'))
    # Para lock real no Azure, configure um Environment com Exclusive Lock no UI
    # e converta este job para deployment job apontando para esse environment.
    jobs:
      - job: publish_exchange
        displayName: "Publish RAML asset with auto bump"
        steps:
          - checkout: self
            clean: true
            fetchDepth: 0

          - task: NodeTool@0
            displayName: "Setup Node.js 20"
            inputs:
              versionSpec: "20.x"

          - task: Bash@3
            displayName: "Install dependencies and Anypoint CLI"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm install
                npm install -g anypoint-cli-v4
                anypoint-cli-v4 --version

          - task: Bash@3
            displayName: "Validate before publish"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm run validate

          - task: Bash@3
            displayName: "Build Exchange package"
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm run package:exchange

          - task: Bash@3
            displayName: "Publish to Exchange with auto bump"
            env:
              ANYPOINT_CLIENT_ID: $(ANYPOINT_CONNECTED_APP_CLIENT_ID)
              ANYPOINT_CLIENT_SECRET: $(ANYPOINT_CONNECTED_APP_CLIENT_SECRET)
              ANYPOINT_ORG: $(ANYPOINT_ORG)
              ANYPOINT_HOST: $(ANYPOINT_HOST)
              EXCHANGE_GROUP_ID: $(EXCHANGE_GROUP_ID)
            inputs:
              targetType: inline
              script: |
                set -euo pipefail
                npm run publish:exchange

          - publish: dist
            artifact: mule-tlf-com-test-exchange-publish-report
            displayName: "Publish Exchange report"
            condition: always()
