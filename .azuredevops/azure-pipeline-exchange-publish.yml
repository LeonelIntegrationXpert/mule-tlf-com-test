trigger: none

parameters:
  - name: publishExchange
    displayName: Publicar no Exchange?
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

resources:
  repositories:
    - repository: guardian
      type: github
      name: LeonelIntegrationXpert/release-flow-guardian-core
      endpoint: github-service-connection
      ref: refs/heads/main

extends:
  template: azure/templates/exchange-publish.yml@guardian
  parameters:
    configPath: release/guardian.config.yml
    guardianRef: main
    publishExchange: ${{ parameters.publishExchange }}
