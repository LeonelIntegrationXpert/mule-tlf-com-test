name: RAML CI + Exchange Publish

on:
  pull_request:
    branches:
      - main
      - master
      - release/current
      - release/next
  push:
    branches:
      - main
      - master
      - release/current
      - release/next
  workflow_dispatch:
    inputs:
      publish_exchange:
        description: "Publicar no Exchange?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: exchange-publish-${{ github.repository }}-mule-tlf-com-test-1-0
  cancel-in-progress: false

env:
  APP_NAME: mule-tlf-com-test
  API_MAIN_FILE: api.raml
  API_VERSION: v1
  EXCHANGE_ASSET_ID: mule-tlf-com-test
  EXCHANGE_ASSET_NAME: Mule TLF COM Test
  EXCHANGE_ASSET_DESCRIPTION: API RAML de laboratório para Release Flow Guardian.
  EXCHANGE_ZIP: dist/mule-tlf-com-test-exchange.zip
  EXCHANGE_MINOR_VERSION: "1.0"
  EXCHANGE_INITIAL_VERSION: "1.0.0"
  EXCHANGE_MAX_CONFLICT_BUMPS: "3"
  EXCHANGE_MAX_TRANSIENT_RETRIES: "3"

jobs:
  validate:
    name: Validate RAML, Manifest and Contract Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm run deps:check

      - name: Validate Guardian config
        run: npm run validate:config

      - name: Validate release manifest
        run: npm run validate:release

      - name: Validate RAML syntax
        run: npm run validate:raml

      - name: Resolve version stability
        run: npm run stability:resolve

      - name: Extract API contract
        run: npm run contract:extract

      - name: API Contract Guard
        run: npm run contract:guard

      - name: Build Exchange package
        run: npm run package:exchange

      - name: Generate HTML report
        if: always()
        run: npm run report:html

      - name: Publish validation summary
        if: always()
        run: |
          echo "## Release Flow Guardian" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f dist/release-flow-guardian-report.md ]; then
            cat dist/release-flow-guardian-report.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f dist/api-contract-diff.md ]; then
            cat dist/api-contract-diff.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Relatório não gerado." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "Baixe o artifact para abrir o HTML report completo." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-flow-guardian-${{ github.run_number }}
          path: |
            dist/*.zip
            dist/*.md
            dist/*.json
            dist/*.html
            dist/*.yml

  publish-exchange:
    name: Publish RAML to Anypoint Exchange
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      ${{
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_exchange == 'true')
      }}

    env:
      ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CONNECTED_APP_CLIENT_ID }}
      ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CONNECTED_APP_CLIENT_SECRET }}
      ANYPOINT_ORG: ${{ secrets.ANYPOINT_ORG }}
      ANYPOINT_HOST: ${{ secrets.ANYPOINT_HOST }}
      EXCHANGE_GROUP_ID: ${{ secrets.EXCHANGE_GROUP_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm run deps:check

      - name: Install Anypoint CLI v4
        run: |
          npm install -g anypoint-cli-v4
          anypoint-cli-v4 --version

      - name: Validate all gates
        run: npm run validate

      - name: Resolve version stability
        run: npm run stability:resolve

      - name: Build Exchange package
        run: npm run package:exchange

      - name: Generate pre-publish report
        if: always()
        run: npm run report:html

      - name: Publish to Exchange with auto bump
        run: npm run publish:exchange

      - name: Generate final HTML report
        if: always()
        run: npm run report:html

      - name: Publish Exchange summary
        if: always()
        run: |
          echo "## Exchange Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f dist/exchange-publish-report.md ]; then
            cat dist/exchange-publish-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f dist/release-flow-guardian-report.md ]; then
            echo "## Guardian Report" >> "$GITHUB_STEP_SUMMARY"
            cat dist/release-flow-guardian-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload publish artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-flow-guardian-publish-${{ github.run_number }}
          path: |
            dist/*.zip
            dist/*.md
            dist/*.json
            dist/*.html
            dist/*.yml
